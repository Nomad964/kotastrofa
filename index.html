<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>КОТАСТРОФА 🐾</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{height:100%;overflow:hidden;background:#0a0d18;font-family:-apple-system,'Segoe UI',Roboto,sans-serif}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{display:block;width:100%;height:100%;touch-action:none}
  .ov{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
    background:rgba(8,10,22,.4);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
    padding:calc(16px + env(safe-area-inset-top)) 16px calc(16px + env(safe-area-inset-bottom))}
  .ov.show{display:flex}
  .card{width:min(440px,94vw);text-align:center;color:#fff;padding:26px 22px;border-radius:26px;
    background:linear-gradient(150deg,rgba(255,255,255,.13),rgba(255,255,255,.05));
    border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px)}
  .ttl{font-weight:900;font-size:clamp(34px,9vw,54px);letter-spacing:1px;
    background:linear-gradient(95deg,#ffd84f,#ff9a5c 45%,#ff6b8a 75%,#ffd84f);-webkit-background-clip:text;background-clip:text;color:transparent}
  .ttl.lose{background:linear-gradient(95deg,#ff8a7a,#ff5b6e,#ffb46e);-webkit-background-clip:text;background-clip:text}
  .sub{margin:10px 0 16px;font-size:14px;line-height:1.5;color:rgba(255,255,255,.85)}
  .keys{display:flex;flex-wrap:wrap;gap:6px 10px;justify-content:center;font-size:12px;color:rgba(255,255,255,.7);margin-bottom:16px}
  .keys b{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:7px;padding:2px 8px;color:#fff;font-weight:700}
  .rec{display:inline-block;font-size:13px;color:rgba(255,255,255,.82);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:6px 16px;margin-bottom:16px}
  .rec b{color:#ffd84f}
  .btn{display:block;width:100%;border:none;cursor:pointer;font-weight:800;font-size:19px;color:#3a2410;padding:15px;border-radius:18px;background:linear-gradient(135deg,#ffd84f,#ff9a5c);box-shadow:0 8px 22px rgba(255,150,80,.35)}
  .btn:active{transform:scale(.97)}
  #pad{position:fixed;left:0;right:0;bottom:0;z-index:30;display:none;justify-content:space-between;align-items:flex-end;padding:0 16px calc(16px + env(safe-area-inset-bottom));pointer-events:none}
  #pad.show{display:flex}
  .tbtn{pointer-events:auto;width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center}
  .tbtn:active{background:rgba(255,255,255,.28);transform:scale(.94)}
  .paw{width:96px;height:96px;font-size:34px;font-weight:800;background:linear-gradient(135deg,rgba(255,216,79,.92),rgba(255,140,90,.92));color:#3a2410}
  #mv{display:flex;gap:12px}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="menu" class="ov show"><div class="card">
  <div class="ttl">КОТАСТРОФА</div>
  <div class="sub">Ты — кот. Стол — твоя сцена, посуда — твоя жертва.<br>Толкай всё со стола, пока бабуля печёт блины. Обернулась — <b style="color:#ffd84f">ЗАМРИ!</b></div>
  <div class="keys"><span><b>◀</b> <b>▶</b> бегать</span><span><b>🐾</b>/<b>Space</b> толкать</span></div>
  <div class="rec">Рекорд: <b id="recM">0</b></div>
  <button class="btn" id="playBtn">Играть</button>
</div></div>
<div id="over" class="ov"><div class="card">
  <div class="ttl lose" id="overTtl">ПОЙМАЛИ!</div>
  <div class="sub" id="overSub">Бабуля всё видела.</div>
  <div class="rec">Шкода: <b id="scoreO">0</b> · Разбито: <b id="brokeO">0</b> · Рекорд: <b id="recO">0</b></div>
  <button class="btn" id="againBtn">Ещё разок</button>
</div></div>
<div id="pad">
  <div id="mv"><div class="tbtn" id="btnL">◀</div><div class="tbtn" id="btnR">▶</div></div>
  <div class="tbtn paw" id="btnP">🐾</div>
</div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=900,H=540,TAU=Math.PI*2;
const OUT='#26150c',FUR='#f0962e',FUR2='#cf7c1f',CREAM='#fff3e0';
let VW=W,VH=H,sc=1,ox=0,oy=0,DPR=1;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2.5);const w=window.innerWidth,h=window.innerHeight;cv.width=w*DPR;cv.height=h*DPR;sc=Math.min(w/VW,h/VH);ox=(w-VW*sc)/2;oy=(h-VH*sc)/2;}
window.addEventListener('resize',resize);resize();
// geometry
const TABLE_L=215,TABLE_R=720,TABLE_Y=374,FLOOR_Y=470;
const SLOTS=[278,368,458,548,638];
const TYPES=[
  {n:'стакан',score:10,w:30,bang:'ДЗЫНЬ!',fx:'glass',gc:['#cfeafa','#9fd4ef']},
  {n:'кружка',score:20,w:34,bang:'ХРЯСЬ!',fx:'glass',gc:['#ef8059','#c4502f']},
  {n:'тарелки',score:30,w:54,bang:'ХРЯСЬ!',fx:'glass',gc:['#f4ecdb','#e3d6bb']},
  {n:'цветок',score:40,w:30,bang:'БУХ!',fx:'flower'},
  {n:'банка',score:45,w:30,bang:'ШМЯК!',fx:'jam'},
  {n:'бутыль',score:50,w:26,bang:'БУЛЬ!',fx:'milk'},
  {n:'ваза',score:60,w:34,bang:'ДЗЫНЬ!',fx:'glass',gc:['#9d8bf0','#5d4dad']},
  {n:'чайник',score:70,w:46,bang:'БДЫЩ!',fx:'tea'},
  {n:'будильник',score:80,w:44,bang:'ТРРРР!',fx:'clock'},
  {n:'аквариум',score:100,w:46,bang:'БУЛТЫХ!',fx:'fish'},
];
// audio
let AC=null;function ac(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}if(AC&&AC.state==='suspended')AC.resume();return AC}
function beep(f,d,t,v,sl){const a=ac();if(!a)return;const o=a.createOscillator(),g=a.createGain();o.type=t||'square';o.frequency.value=f;if(sl)o.frequency.exponentialRampToValueAtTime(sl,a.currentTime+d);g.gain.value=v||.07;g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d)}
function crash(){const a=ac();if(!a)return;const len=a.sampleRate*.28,b=a.createBuffer(1,len,a.sampleRate),d=b.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);const s=a.createBufferSource();s.buffer=b;const f=a.createBiquadFilter();f.type='highpass';f.frequency.value=1500;const g=a.createGain();g.gain.value=.28;s.connect(f);f.connect(g);g.connect(a.destination);s.start();beep(2400,.14,'triangle',.04,400)}
function meow(){beep(680,.18,'sawtooth',.05,420);setTimeout(()=>beep(520,.14,'sawtooth',.04,300),120)}
function whistle(){beep(1100,.5,'sine',.05,220)}
// state
let state='menu',cat,owner,objects,particles,pops,fishes,score,combo,comboT,timeLeft,shake,broken,best=0;
try{best=+localStorage.getItem('kotastrofa_best')||0}catch(e){}
const pk={fly:-1,next:2.4,stack:3},ms={phase:'hidden',t:3.5},wc={t:9,dur:9,wait:6},ss={t:-4,x:600,y:70};
let keyL=false,keyR=false;
function spawn(slot,delay){return{type:TYPES[Math.floor(Math.random()*TYPES.length)],x:SLOTS[slot],y:TABLE_Y,slot,vy:0,vx:0,rot:0,falling:false,delay:delay||0,wob:0,appear:0}}
function reset(){cat={x:458,dir:1,pushT:-1,shoved:false,walk:0,moving:false,pose:'idle',whT:1};objects=[];for(let i=0;i<SLOTS.length;i++)objects.push(spawn(i,0));owner={state:'away',t:3+Math.random()*3,f:0};particles=[];pops=[];fishes=[];score=0;combo=0;comboT=0;timeLeft=60;shake=0;broken=0;document.getElementById('recM').textContent=best}
// input
const menu=document.getElementById('menu'),over=document.getElementById('over'),pad=document.getElementById('pad');
function start(){ac();reset();state='play';menu.classList.remove('show');over.classList.remove('show');pad.classList.add('show');meow()}
document.getElementById('playBtn').onclick=start;document.getElementById('againBtn').onclick=start;
function push(){if(state!=='play'){start();return}if(cat.pushT>=0&&cat.pushT<0.22)return;if(owner.state==='watch'){caught();return}cat.pushT=0;cat.shoved=false;beep(200,.05,'square',.04)}
function doShove(){let tg=null,bd=66;for(const o of objects){if(o.falling||o.delay>0)continue;const d=Math.abs(o.x-cat.x);if(d<bd){bd=d;tg=o}}if(!tg){beep(150,.05,'square',.03);return}const mid=(TABLE_L+TABLE_R)/2,dir=tg.x<mid?-1:1;tg.x+=dir*(16+Math.random()*8);tg.wob=0.35;cat.dir=dir;beep(320+Math.random()*80,.06,'square',.05);if(tg.x-tg.type.w/2<TABLE_L-8||tg.x+tg.type.w/2>TABLE_R+8){tg.falling=true;tg.vx=dir*65;whistle()}}
function caught(){state='over';shake=14;beep(170,.5,'sawtooth',.11,55);meow();if(score>best){best=score;try{localStorage.setItem('kotastrofa_best',best)}catch(e){}}document.getElementById('scoreO').textContent=score;document.getElementById('brokeO').textContent=broken;document.getElementById('recO').textContent=best;document.getElementById('overTtl').textContent='ПОЙМАЛИ!';document.getElementById('overTtl').className='ttl lose';document.getElementById('overSub').textContent='Бабуля всё видела. Сковородка не дремлет.';pad.classList.remove('show');setTimeout(()=>over.classList.add('show'),650)}
function timeUp(){state='over';if(score>best){best=score;try{localStorage.setItem('kotastrofa_best',best)}catch(e){}}document.getElementById('scoreO').textContent=score;document.getElementById('brokeO').textContent=broken;document.getElementById('recO').textContent=best;document.getElementById('overTtl').textContent='ВРЕМЯ ВЫШЛО';document.getElementById('overTtl').className='ttl';document.getElementById('overSub').textContent='Минута шкоды истекла. Блины готовы.';pad.classList.remove('show');setTimeout(()=>over.classList.add('show'),300)}
const bL=document.getElementById('btnL'),bR=document.getElementById('btnR'),bP=document.getElementById('btnP');
function hold(el,set){el.addEventListener('pointerdown',e=>{e.preventDefault();ac();set(true)});el.addEventListener('pointerup',e=>{e.preventDefault();set(false)});el.addEventListener('pointerleave',()=>set(false))}
hold(bL,v=>keyL=v);hold(bR,v=>keyR=v);bP.addEventListener('pointerdown',e=>{e.preventDefault();ac();push()});
window.addEventListener('keydown',e=>{if(e.repeat)return;if(e.code==='ArrowLeft')keyL=true;else if(e.code==='ArrowRight')keyR=true;else if(e.code==='Space'){e.preventDefault();push()}});
window.addEventListener('keyup',e=>{if(e.code==='ArrowLeft')keyL=false;if(e.code==='ArrowRight')keyR=false});
// break
function breakObj(o){o.dead=true;broken++;combo=comboT>0?Math.min(combo+1,5):1;comboT=2.2;const pts=o.type.score*combo;score+=pts;crash();shake=Math.max(shake,7);pops.push({k:'bang',txt:o.type.bang,x:o.x,y:FLOOR_Y-50,t:1});pops.push({k:'score',txt:'+'+pts+(combo>1?' x'+combo:''),x:o.x,y:FLOOR_Y-90,t:1.1});const fx=o.type.fx,X=o.x,Y=FLOOR_Y-8,wd=o.type.w;
  function slivers(n,col){for(let i=0;i<n;i++)particles.push({k:'sliver',x:X+(Math.random()-.5)*wd,y:Y,vx:(Math.random()-.5)*320,vy:-Math.random()*300-80,t:.6+Math.random()*.4,rot:Math.random()*TAU,vr:(Math.random()-.5)*18,c:typeof col==='function'?col(i):col,s:5+Math.random()*5})}
  function drops(n,col,sp){for(let i=0;i<n;i++)particles.push({k:'drop',x:X+(Math.random()-.5)*wd,y:Y,vx:(Math.random()-.5)*sp,vy:-Math.random()*sp*.8-50,t:.5+Math.random()*.4,c:typeof col==='function'?col(i):col,s:2+Math.random()*3})}
  function puddle(col,sm){particles.push({k:'puddle',x:X,s:4,smax:sm,c:col,t:2.4})}
  function petals(n,col){for(let i=0;i<n;i++)particles.push({k:'petal',x:X,y:Y-10,vx:(Math.random()-.5)*180,vy:-Math.random()*160-40,t:1+Math.random()*.6,rot:Math.random()*TAU,vr:(Math.random()-.5)*8,c:typeof col==='function'?col(i):col,s:5,ph:Math.random()*TAU})}
  if(fx==='glass'){slivers(11,i=>i%2?o.type.gc[0]:o.type.gc[1]);drops(3,'#ffffff',160)}
  else if(fx==='milk'){puddle('rgba(243,247,252,.92)',40);slivers(5,'#eaf0f6');drops(10,'#f1f5fb',240)}
  else if(fx==='jam'){puddle('rgba(176,38,52,.92)',36);slivers(5,'#d89a52');drops(10,i=>i%2?'#b5283a':'#cf3f4a',230)}
  else if(fx==='tea'){puddle('rgba(120,80,42,.6)',34);slivers(7,'#3f8f9c');for(let i=0;i<4;i++)particles.push({k:'puff',x:X+(Math.random()-.5)*20,y:Y-12,vx:(Math.random()-.5)*30,vy:-44-Math.random()*30,t:.85,c:'rgba(210,190,160,',s:6})}
  else if(fx==='clock'){slivers(5,'#cfa84a');for(let i=0;i<2;i++)particles.push({k:'spring',x:X,y:Y,vx:(Math.random()-.5)*210,vy:-260-Math.random()*70,t:.85,rot:Math.random()*TAU,vr:9,c:'#b7bcc2',s:6});for(let i=0;i<4;i++)particles.push({k:'shard',x:X,y:Y,vx:(Math.random()-.5)*240,vy:-Math.random()*220-70,t:.7,rot:Math.random()*TAU,vr:8,c:'#9aa0a8',s:4});beep(1400,.18,'square',.05,600);beep(1650,.12,'square',.04)}
  else if(fx==='fish'){puddle('rgba(140,210,235,.55)',38);drops(13,'#8fd4ec',280);fishes.push({x:X,y:FLOOR_Y-14,vx:(Math.random()-.5)*160,vy:-220,t:4})}
  else{slivers(4,'#9c5f33');petals(6,i=>i%2?'#f0608a':'#f48aab');petals(4,'#56b85e');drops(6,'#6b4a2c',160)}
  if(combo>=3)for(let i=0;i<8;i++)particles.push({k:'star',x:X,y:FLOOR_Y-40,vx:(Math.random()-.5)*240,vy:-Math.random()*200-60,t:.7,rot:Math.random()*TAU,vr:6,c:'#ffd84f',s:5});
  const idx=objects.indexOf(o);if(idx>=0)setTimeout(()=>{objects[idx]=spawn(o.slot,.8+Math.random())},0)}
// ambient update
function ambient(dt){if(owner.state==='away'&&state!=='over'){pk.next-=dt;if(pk.next<=0&&pk.fly<0){pk.fly=0;pk.next=2+Math.random()*1.6;beep(380,.14,'sine',.03,760)}}if(pk.fly>=0){pk.fly+=dt/.6;if(pk.fly>=1){pk.fly=-1;pk.stack=Math.min(pk.stack+1,8)}}ms.t-=dt;if(ms.t<=0){if(ms.phase==='hidden'){ms.phase='peek';ms.t=.7}else if(ms.phase==='peek'){ms.phase='push';ms.t=.9;beep(1500,.06,'square',.02)}else if(ms.phase==='push'){ms.phase='giggle';ms.t=.7;beep(1800,.05,'square',.02)}else{ms.phase='hidden';ms.t=4+Math.random()*5}}wc.t+=dt;if(wc.t>wc.dur+wc.wait){wc.t=0;wc.wait=6+Math.random()*9}ss.t+=dt;if(ss.t>.5){ss.t=-(4+Math.random()*7);ss.x=575+Math.random()*110;ss.y=62+Math.random()*55}}
let last=performance.now(),tNow=0;
function update(dt){tNow+=dt;shake=Math.max(0,shake-dt*30);ambient(dt);for(const p of particles){p.t-=dt;if(p.k==='leaf'||p.k==='petal'){p.vy+=110*dt;p.x+=p.vx*dt+Math.sin(tNow*6+(p.ph||0))*34*dt;p.y+=p.vy*dt;p.vx*=(1-dt);if(p.rot!==undefined)p.rot+=p.vr*dt}else if(p.k==='puddle'){p.s=Math.min(p.smax,p.s+p.smax*2.4*dt)}else if(p.k==='puff'){p.s+=22*dt;p.x+=(p.vx||0)*dt;p.y+=(p.vy||0)*dt}else{p.vy+=750*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.rot!==undefined)p.rot+=p.vr*dt;if(p.y>FLOOR_Y-3&&p.vy>0){p.y=FLOOR_Y-3;p.vy*=-.4;p.vx*=.6}}}particles=particles.filter(p=>p.t>0);for(const p of pops){p.t-=dt;if(p.k==='score')p.y-=40*dt}pops=pops.filter(p=>p.t>0);for(const f of fishes){f.t-=dt;f.vy+=800*dt;f.x+=f.vx*dt;f.y+=f.vy*dt;if(f.y>FLOOR_Y-8){f.y=FLOOR_Y-8;f.vy=-Math.abs(f.vy)*.5-40;f.vx*=.8}}fishes=fishes.filter(f=>f.t>0);owner.f+=((owner.state==='away'?0:1)-owner.f)*Math.min(1,dt*8);
  if(state!=='play')return;
  timeLeft-=dt;if(timeLeft<=0){timeLeft=0;timeUp();return}
  let mv=0;if(keyL)mv-=1;if(keyR)mv+=1;cat.moving=mv!==0;if(mv){cat.dir=mv;cat.walk+=dt*10}cat.x=Math.max(TABLE_L+34,Math.min(TABLE_R-34,cat.x+mv*275*dt));
  if(cat.pushT>=0){cat.pushT+=dt;if(!cat.shoved&&cat.pushT>=.09){cat.shoved=true;doShove()}if(cat.pushT>.38)cat.pushT=-1}
  cat.pose=cat.pushT>=0?'push':cat.moving?'run':(owner.state!=='away'?'innocent':'idle');
  if(cat.pose==='innocent'){cat.whT-=dt;if(cat.whT<=0){cat.whT=1.1+Math.random()*.5;beep(1180+Math.random()*200,.12,'sine',.04);pops.push({k:'note',txt:Math.random()<.5?'♪':'♫',x:cat.x+cat.dir*14,y:TABLE_Y-96,t:.9,vy:-26,vx:cat.dir*18})}}
  owner.t-=dt;const diff=Math.min(score/1500,1);if(owner.t<=0){if(owner.state==='away'){owner.state='warn';owner.t=Math.max(.5,.85-diff*.3);beep(880,.12,'sine',.07)}else if(owner.state==='warn'){owner.state='watch';owner.t=1.6+Math.random()*1.4+diff}else{owner.state='away';owner.t=2.5+Math.random()*(4.5-diff*2)}}
  for(const o of objects){if(o.delay>0){o.delay-=dt;continue}o.appear=Math.min(1,o.appear+dt*4);o.wob=Math.max(0,o.wob-dt);if(o.falling&&!o.dead){o.vy+=920*dt;o.y+=o.vy*dt;o.x+=o.vx*dt;o.rot+=(o.vx>0?1:-1)*4.5*dt;if(o.y>=FLOOR_Y-6)breakObj(o)}}
  comboT=Math.max(0,comboT-dt);if(comboT===0)combo=0;
  for(const p of pops)if(p.k==='note'){p.x+=p.vx*dt;p.y+=p.vy*dt}
}
// ===== draw =====
function rr(x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.arcTo(x+w,y,x+w,y+h,r);cx.arcTo(x+w,y+h,x,y+h,r);cx.arcTo(x,y+h,x,y,r);cx.arcTo(x,y,x+w,y,r);cx.closePath()}
function fo(f,lw){cx.fillStyle=f;cx.fill();cx.strokeStyle=OUT;cx.lineWidth=lw||3;cx.lineJoin='round';cx.stroke()}
function drawRoom(){let g=cx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#2c3e66');g.addColorStop(.7,'#243353');g.addColorStop(1,'#1d2b45');cx.fillStyle=g;cx.fillRect(0,0,W,FLOOR_Y);
  cx.fillStyle='rgba(255,255,255,.025)';for(let i=0;i<12;i++)cx.fillRect(i*80,0,34,FLOOR_Y);
  // window
  const wx=555,wy=48,ww=200,wh=160;g=cx.createLinearGradient(0,wy,0,wy+wh);g.addColorStop(0,'#0e1632');g.addColorStop(1,'#1d2c55');cx.fillStyle=g;rr(wx,wy,ww,wh,10);cx.fill();
  cx.save();rr(wx,wy,ww,wh,10);cx.clip();
  for(let i=0;i<18;i++){const sx=wx+12+((i*53)%(ww-20)),sy=wy+12+((i*37)%(wh-50));cx.fillStyle='rgba(255,255,255,.7)';cx.fillRect(sx,sy,2,2)}
  cx.fillStyle='#f5e9b8';cx.shadowColor='#f5e9b8';cx.shadowBlur=22;cx.beginPath();cx.arc(wx+118,wy+52,23,0,TAU);cx.fill();cx.shadowBlur=0;cx.fillStyle='rgba(14,22,50,.9)';cx.beginPath();cx.arc(wx+128,wy+46,19,0,TAU);cx.fill();
  // falling star
