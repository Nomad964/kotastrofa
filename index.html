<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>КОТАСТРОФА 🐾</title>
<script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}

  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{display:block;width:100%;height:100%;touch-action:none}
  .ov{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
    background:rgba(8,10,22,.4);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
    padding:calc(16px + env(safe-area-inset-top)) 16px calc(16px + env(safe-area-inset-bottom))}
  .ov.show{display:flex}
  .card{width:min(440px,94vw);text-align:center;color:#fff;padding:26px 22px;border-radius:26px;
    background:linear-gradient(150deg,rgba(255,255,255,.13),rgba(255,255,255,.05));

<body>

</div></div>
<div id="errOv"><div class="errCard"><div class="errTxt">Ой, что-то сломалось 😿</div><button class="errBtn" id="errBtn">Написать нам</button></div></div>
<div id="pad">
  <div id="mv"><div class="tbtn" id="btnL">◀</div><div class="tbtn" id="btnR">▶</div></div>
  <div class="tbtn paw" id="btnP">🐾</div>
</div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
// Portrait virtual scene (phone-shaped). Everything is composed for this frame.

function resize(){DPR=Math.min(window.devicePixelRatio||1,2.5);const w=window.innerWidth,h=window.innerHeight;cv.width=w*DPR;cv.height=h*DPR;
  // CONTAIN so the whole play area is always visible (never crop gameplay). Letterbox gaps are filled with wall/floor in frame() so there are no black bars.
  sc=Math.min(w/VW,h/VH);

window.addEventListener('resize',resize);resize();
// prevent mobile-Safari double-tap zoom / pinch-gesture zoom from stealing focus
document.addEventListener('dblclick',e=>{e.preventDefault()},{passive:false});
document.addEventListener('gesturestart',e=>{e.preventDefault()},{passive:false});
document.addEventListener('gesturechange',e=>{e.preventDefault()},{passive:false});
document.addEventListener('touchmove',e=>{if(e.touches&&e.touches.length>1)e.preventDefault()},{passive:false});

const STOVE={x:22,y:544};
const GRANNY_X=108;
// ancestor portrait (upper left)
const PORTRAIT={x:62,y:168};
const TYPES=[
  {n:'стакан',score:10,w:30,bang:'ДЗЫНЬ!',fx:'glass',gc:['#cfeafa','#9fd4ef']},
  {n:'кружка',score:20,w:34,bang:'ХРЯСЬ!',fx:'glass',gc:['#ef8059','#c4502f']},
  {n:'тарелки',score:30,w:54,bang:'ХРЯСЬ!',fx:'glass',gc:['#f4ecdb','#e3d6bb']},

  {n:'будильник',score:80,w:44,bang:'ТРРРР!',fx:'clock'},
  {n:'аквариум',score:100,w:46,bang:'БУЛТЫХ!',fx:'fish'},
];
// audio
let AC=null;function ac(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}if(AC&&AC.state==='suspended')AC.resume();return AC}
function beep(f,d,t,v,sl){const a=ac();if(!a)return;const o=a.createOscillator(),g=a.createGain();o.type=t||'square';o.frequency.value=f;if(sl)o.frequency.exponentialRampToValueAtTime(sl,a.currentTime+d);g.gain.value=v||.07;g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d)}
function crash(){const a=ac();if(!a)return;const len=a.sampleRate*.28,b=a.createBuffer(1,len,a.sampleRate),d=b.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);const s=a.createBufferSource();s.buffer=b;const f=a.createBiquadFilter();f.type='highpass';f.frequency.value=1500;const g=a.createGain();g.gain.value=.28;s.connect(f);f.connect(g);g.connect(a.destination);s.start();beep(2400,.14,'triangle',.04,400)}

// state
let state='menu',cat,owner,objects,particles,pops,fishes,score,combo,comboT,timeLeft,shake,broken,best=0;
let revivesLeft=2; // rewarded revives allowed per run, reset in start()
try{best=+localStorage.getItem('kotastrofa_best')||0}catch(e){}

if(vk){try{vk.send('VKWebAppInit')}catch(e){}}
const VK_KEY='kotastrofa_best';
// rewarded ads helper. cb(true) on a watched reward; outside VK we simulate success.
function showRewarded(cb){
  if(inVK&&vk){
    vk.send('VKWebAppShowNativeAds',{ad_format:'reward'})
      .then(r=>cb(!!(r&&r.result)))
      .catch(()=>cb(false));
  }else{
    setTimeout(()=>cb(true),600);
  }
}
// persist best to VK cloud storage (guarded)
function saveBestVK(){if(inVK&&vk){try{vk.send('VKWebAppStorageSet',{key:VK_KEY,value:String(best)})}catch(e){}}}

function loadBestVK(){
  if(!inVK||!vk)return;

    vk.send('VKWebAppStorageGet',{keys:[VK_KEY]}).then(r=>{
      try{
        const item=r&&r.keys&&r.keys[0];

    }).catch(()=>{});
  }catch(e){}
}
loadBestVK();
// ===== BUG REPORT =====
const VK_ME='https://vk.me/club231698113';
function openSupport(){try{window.open(VK_ME,'_blank')}catch(e){}}
let errShown=false; // show the error overlay at most once
function showErrOverlay(){
  if(errShown)return;errShown=true;
  try{document.getElementById('errOv').classList.add('show')}catch(e){}
}
window.addEventListener('error',showErrOverlay);
window.addEventListener('unhandledrejection',showErrOverlay);
const PK_MAX=6;const pk={fly:-1,next:1.8,stack:0},ms={phase:'hidden',t:3.5},wc={t:9,dur:9,wait:6},ss={t:-4,x:WIN.x+30,y:WIN.y+24};
// --- sparrow with jokes: flies across the upper wall, pauses to show a comic speech bubble, flies off ---
const JOKES=["Это не я. Это гравитация. Я лишь помог.", "Усы, лапы и алиби.", "Я не хулиган, я тестировщик прочности.", "Ваза прыгнула сама. Я только свидетель.", "Я не сбрасываю. Я провожаю.", "Я не виноват, что у стола есть край.", "Девять жизней — девять шансов разбить сервиз.", "Совесть чиста: я её ни разу не доставал.", "План на ночь: хаос и обаяние.", "Бьётся не посуда, а рекорды.", "Кто рано встаёт — тому и тарелки.", "Семь бед — один прыжок.", "Работа не волк, а волк — за окном.", "Тише едешь — дальше будешь от веника.", "Не буди кота, пока тихо.", "Под лежачий хвост валерьянка не течёт.", "Сделал дело — гуляй с битым.", "Делу время, а коту — потеха.", "Любишь кататься — люби и сервиз катать.", "Не всё коту масленица, но сегодня — да.", "Кашу маслом не испортишь, а вазу — запросто.", "Поспешишь — посуду насмешишь.", "Кто не успел — тот не разбил.", "Терпение и труд всё перетрут, а кот — перебьёт.", "Глаза боятся — лапы делают.", "Тяжело в учении — легко в крушении.", "Что упало у кота — то пропало.", "Не место красит кота, а кот — место.", "Слово не воробей… а воробей — вон он, летит.", "Аппетит приходит во время крушения.", "Тише: бабуля считает блины.", "Бабуля печёт блины, а я кую характер.", "Луна свидетель: я был котёнком.", "Полка — это трамплин, если ты мышь.", "Аквариум — это был ночной дозор.", "Порядок — это когда всё на полу.", "Тут всё моё. По праву когтя.", "«Мяу» переводится как «извините, но нет».", "Сковородка дремлет — действуй.", "Блины бабуле, грохот — мне.", "Раньше и сметана была гуще, и я моложе.", "В наше время посуда билась честно, без рекламы.", "Эх, молодёжь: даже вазу уронить не умеют.", "Помню, был котёнком — и стол был выше.", "Дефицит был на всё, кроме приключений.", "По талонам давали валерьянку. Сам помню.", "Тогда и трава зеленее, и занавески целее.", "Старая закалка: бью с одного прыжка.", "Раньше будильник заводили, а не роняли. Жаль.", "Раньше за такое в угол. Сейчас — рекорд.", "Я не ленивый. Я экономлю девять жизней.", "Спать — это тоже работа. Сменная.", "Меня воспитывала улица. И подоконник.", "У меня лапки. Это юридический термин.", "Я бы убрал, но у меня лапки.", "Совесть есть. Просто спит на батарее.", "Не мешай: я в творческом поиске жертвы.", "Жизнь коротка. Сервиз — ещё короче.", "Я философ. Битая ваза — мой трактат.", "Минимализм: чем меньше посуды, тем чище.", "Каждый кот — немного стихия.", "Дзен — это когда бабуля не обернулась.", "Я не злой. Я просто хорошо мотивирован.", "Скромность — не мой размер.", "Понедельник — день, когда даже кот грустит.", "Отпуск был вчера. Сегодня — снова посуда.", "Зарплата — как мышь: вроде была, и нет.", "Совещание у миски в восемь. Не опаздывай.", "Ипотека на когтеточку — это надолго.", "Работаю за еду. И за уважение к когтям.", "Премию не дали — разобью на премию сам.", "Пятница! Можно крушить с чистой совестью.", "Стаж двенадцать жизней, а пенсии всё нет.", "Кредит за корм брать не буду. Я гордый.", "Ночь нежна, а посуда — хрупка.", "Луна, тишина и один наглый кот.", "Звезда упала — загадал ещё одну вазу.", "Город спит, а служба идёт.", "В темноте все коты серые. Кроме меня — я рыжий.", "Хорошая ночь начинается с «дзынь».", "Под луной всё прощается. Даже сервиз.", "Спокойной ночи, бабуля. Я ненадолго.", "Темно? Значит, время для подвигов.", "Сон — для слабых и для сытых.", "Я только зашёл погреться. И остался хозяином.", "Характер скверный, но обаяние спасает.", "Меня недооценивают. Особенно бабуля.", "Я бы извинился, но это против моих принципов.", "Если посуда цела — значит, я плохо старался.", "Мечтай по-крупному: начни с сервиза.", "Сегодня я в ударе. И посуда тоже.", "Гладят — мурчу. Отвернулись — крушу.", "Хорошо там, где нас нет. И где посуда цела.", "Не рой яму другому — столкни вазу.", "Старого кота новым трюкам не учат.", "Без труда не вытащишь рыбку из аквариума. Но я смог.", "Утро добрым не бывает. Бывает с грохотом.", "Мир, труд, май и битый фарфор.", "Всё гениальное — просто. Толкни и смотри.", "Запас карман не тянет, а полку — да.", "Жадность фраера сгубила. А кота — раззадорила."];
// phase: 'wait' (offscreen) -> 'flyin' -> 'talk' (bubble) -> 'flyout'. x/y in scene coords, dir = facing
const sp={phase:'wait',t:6,x:-40,y:380,dir:1,joke:0,prev:-1};
// tipping book the mouse pushes off the shelf (cosmetic). state: 'rest' -> 'tip' -> 'fall' -> 'rest'
const book={state:'rest',rot:0,x:0,y:0,vy:0,vx:0,vr:0};
let keyL=false,keyR=false;

function reset(){cat={x:(TABLE_L+TABLE_R)/2,dir:1,pushT:-1,shoved:false,walk:0,moving:false,pose:'idle',whT:1};objects=[];for(let i=0;i<SLOTS.length;i++)objects.push(spawn(i,0));owner={state:'away',t:3+Math.random()*3,f:0};particles=[];pops=[];fishes=[];score=0;combo=0;comboT=0;timeLeft=60;shake=0;broken=0;pk.stack=0;pk.fly=-1;pk.next=1.8;book.state='rest';book.rot=0;sp.phase='wait';sp.t=6;sp.x=-40;document.getElementById('recM').textContent=best}
// input
const menu=document.getElementById('menu'),over=document.getElementById('over'),pad=document.getElementById('pad');
function start(){ac();reset();revivesLeft=2;state='play';menu.classList.remove('show');over.classList.remove('show');pad.classList.add('show');meow()}
document.getElementById('playBtn').onclick=start;document.getElementById('againBtn').onclick=start;
// bug-report wiring
document.getElementById('bugBtn').onclick=openSupport;
document.getElementById('errBtn').onclick=openSupport;
function push(){if(state!=='play'){start();return}if(cat.pushT>=0&&cat.pushT<0.22)return;if(owner.state==='watch'){caught();return}cat.pushT=0;cat.shoved=false;beep(200,.05,'square',.04)}
function doShove(){let tg=null,bd=66;for(const o of objects){if(o.falling||o.delay>0)continue;const d=Math.abs(o.x-cat.x);if(d<bd){bd=d;tg=o}}if(!tg){beep(150,.05,'square',.03);return}const mid=(TABLE_L+TABLE_R)/2,dir=tg.x<mid?-1:1;tg.x+=dir*(16+Math.random()*8);tg.wob=0.35;cat.dir=dir;beep(320+Math.random()*80,.06,'square',.05);if(tg.x-tg.type.w/2<TABLE_L-8||tg.x+tg.type.w/2>TABLE_R+8){tg.falling=true;tg.vx=dir*65;whistle()}}

// ===== REWARDED placements =====
// a) REVIVE the same run after being caught
function doRevive(){
  if(state!=='over'||overCause!=='caught'||revivesLeft<=0)return;
  const btn=document.getElementById('reviveBtn');btn.disabled=true;
  showRewarded(ok=>{
    if(!ok){btn.disabled=false;return;}
    revivesLeft--;
    over.classList.remove('show');
    state='play';
    owner.state='away';owner.t=2.2;owner.f=0; // a moment of grace, grandma turns away
    last=performance.now(); // avoid a huge dt spike on resume
    pad.classList.add('show');
    meow();
  });
}
// b) DOUBLE the score (any cause)
function doDouble(){
  if(state!=='over')return;
  const btn=document.getElementById('dblBtn');btn.disabled=true;
  showRewarded(ok=>{
    if(!ok){btn.disabled=false;return;}
    score*=2;
    document.getElementById('scoreO').textContent=score;
    commitBest();
    document.getElementById('recO').textContent=best;
    btn.style.display='none'; // can't be used twice
  });
}
document.getElementById('reviveBtn').onclick=doRevive;
